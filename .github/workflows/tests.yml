name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio ruff
      - name: Lint
        run: ruff check .
      - name: Run tests
        run: pytest tests/ -v

  card:
    name: Card smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci || npm install
      - run: node --check custom_components/protect_media_viewer/frontend/protect-media-viewer-card.js
      - run: npm test

  imports:
    name: Import check (real HA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install homeassistant uiprotect
      - run: python scripts/import_check.py
